# 共通設定
x-common: &common
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    # Claude Code CLI 認証情報（コンテナ専用ボリューム）
    - claude-data:/home/bun/.claude
    # ワークスペース（エージェントの作業ディレクトリ）
    - ${WORKSPACE_PATH:-$HOME/thor_workspace}:/workspace
    # Git設定
    - ~/.gitconfig:/home/bun/.gitconfig:ro
  environment: &common-env
    # GitHub CLI (GH_TOKEN環境変数で認証)
    - GH_TOKEN=${GH_TOKEN:-}
    - NODE_ENV=production
    # Discord
    - DISCORD_TOKEN=${DISCORD_TOKEN:-}
    - DISCORD_ALLOWED_USER=${DISCORD_ALLOWED_USER:-}
    - AUTO_REPLY_CHANNELS=${AUTO_REPLY_CHANNELS:-}
    - DISCORD_STREAMING=${DISCORD_STREAMING:-true}
    - DISCORD_SHOW_THINKING=${DISCORD_SHOW_THINKING:-true}
    - WORKSPACE_PATH=/workspace
    # Agent
    - AGENT_MODEL=${AGENT_MODEL:-}
    # Scheduler data directory (for schedules.json)
    - DATA_DIR=/workspace/.thor
    - MCP_PORT=${MCP_PORT:-18765}
    - LOG_LEVEL=${LOG_LEVEL:-info}
    - TIMEZONE=${TIMEZONE:-Asia/Tokyo}

services:
  # ミニマム版（デフォルト）
  thor:
    <<: *common
    build: .
    env_file:
      - .env
    container_name: thor

  # フル版（uv + Python）
  thor-max:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.max
    container_name: thor-max
    ports:
      - "8080:8080"

volumes:
  claude-data:
    name: thor_claude-data
